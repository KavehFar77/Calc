<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0eeea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .calc {
      width: 300px;
      background: #ffffff;
      border: 1px solid #e0ddd6;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }

    .display {
      padding: 1.5rem 1.25rem 1rem;
      text-align: right;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
      border-bottom: 1px solid #e0ddd6;
      background: #faf9f7;
    }

    .display .expr {
      font-size: 13px;
      color: #aaa;
      min-height: 18px;
      word-break: break-all;
    }

    .display .val {
      font-size: 36px;
      font-weight: 400;
      color: #1a1a1a;
      word-break: break-all;
      line-height: 1.1;
    }

    .btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .btn {
      height: 64px;
      border: none;
      border-right: 1px solid #e0ddd6;
      border-bottom: 1px solid #e0ddd6;
      background: transparent;
      color: #1a1a1a;
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:nth-child(4n) { border-right: none; }
    .btn:nth-last-child(-n+4) { border-bottom: none; }
    .btn:hover { background: #f5f4f1; }
    .btn:active { background: #eceae5; transform: scale(0.96); }

    .btn.op { color: #185FA5; font-size: 20px; }
    .btn.fn { color: #666; font-size: 15px; }

    .btn.eq {
      background: #185FA5;
      color: #fff;
      font-size: 22px;
      border-right: none;
    }
    .btn.eq:hover { background: #0C447C; }
    .btn.eq:active { background: #042C53; }

    .btn.zero {
      grid-column: span 2;
      justify-content: center;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      .calc { background: #2c2c2a; border-color: #3a3a38; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
      .display { background: #252523; border-color: #3a3a38; }
      .display .val { color: #f0eeea; }
      .display .expr { color: #666; }
      .btn { color: #f0eeea; border-color: #3a3a38; }
      .btn:hover { background: #333331; }
      .btn:active { background: #3d3d3b; }
      .btn.fn { color: #aaa; }
    }
  </style>
</head>
<body>
  <div class="calc">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="val" id="val">0</div>
    </div>
    <div class="btns" id="btns">
      <button class="btn fn" data-action="ac">AC</button>
      <button class="btn fn" data-action="sign">+/−</button>
      <button class="btn fn" data-action="pct">%</button>
      <button class="btn op" data-action="op" data-op="÷">÷</button>

      <button class="btn" data-action="num" data-num="7">7</button>
      <button class="btn" data-action="num" data-num="8">8</button>
      <button class="btn" data-action="num" data-num="9">9</button>
      <button class="btn op" data-action="op" data-op="×">×</button>

      <button class="btn" data-action="num" data-num="4">4</button>
      <button class="btn" data-action="num" data-num="5">5</button>
      <button class="btn" data-action="num" data-num="6">6</button>
      <button class="btn op" data-action="op" data-op="−">−</button>

      <button class="btn" data-action="num" data-num="1">1</button>
      <button class="btn" data-action="num" data-num="2">2</button>
      <button class="btn" data-action="num" data-num="3">3</button>
      <button class="btn op" data-action="op" data-op="+">+</button>

      <button class="btn zero" data-action="num" data-num="0">0</button>
      <button class="btn" data-action="dot">.</button>
      <button class="btn eq" data-action="eq">=</button>
    </div>
  </div>

  <script>
    let cur = '0', prev = null, op = null, justEvaled = false;

    const valEl = document.getElementById('val');
    const exprEl = document.getElementById('expr');

    function update() {
      let display = cur;
      if (display.length > 10) {
        let n = parseFloat(display);
        display = parseFloat(n.toPrecision(9)).toString();
      }
      valEl.textContent = display;
    }

    function compute(a, b, o) {
      a = parseFloat(a); b = parseFloat(b);
      if (o === '+') return a + b;
      if (o === '−') return a - b;
      if (o === '×') return a * b;
      if (o === '÷') return b === 0 ? 'Error' : a / b;
      return b;
    }

    document.getElementById('btns').addEventListener('click', e => {
      const btn = e.target.closest('.btn');
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'num') {
        const n = btn.dataset.num;
        if (cur === '0' || justEvaled) { cur = n; justEvaled = false; }
        else if (cur.length < 12) cur += n;
        update();
      } else if (action === 'dot') {
        if (justEvaled) { cur = '0'; justEvaled = false; }
        if (!cur.includes('.')) cur += '.';
        update();
      } else if (action === 'ac') {
        cur = '0'; prev = null; op = null; justEvaled = false;
        exprEl.textContent = '';
        update();
      } else if (action === 'sign') {
        cur = cur.startsWith('-') ? cur.slice(1) : (cur === '0' ? '0' : '-' + cur);
        update();
      } else if (action === 'pct') {
        cur = String(parseFloat(cur) / 100);
        update();
      } else if (action === 'op') {
        const o = btn.dataset.op;
        if (op && !justEvaled) {
          const result = compute(prev, cur, op);
          cur = String(result);
          update();
        }
        prev = cur; op = o; justEvaled = true;
        exprEl.textContent = cur + ' ' + o;
      } else if (action === 'eq') {
        if (!op || prev === null) return;
        exprEl.textContent = prev + ' ' + op + ' ' + cur + ' =';
        const result = compute(prev, cur, op);
        cur = String(result);
        prev = null; op = null; justEvaled = true;
        update();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') document.querySelector(`[data-num="${e.key}"]`)?.click();
      else if (e.key === '.') document.querySelector('[data-action="dot"]')?.click();
      else if (e.key === '+') document.querySelector('[data-op="+"]')?.click();
      else if (e.key === '-') document.querySelector('[data-op="−"]')?.click();
      else if (e.key === '*') document.querySelector('[data-op="×"]')?.click();
      else if (e.key === '/') { e.preventDefault(); document.querySelector('[data-op="÷"]')?.click(); }
      else if (e.key === 'Enter' || e.key === '=') document.querySelector('[data-action="eq"]')?.click();
      else if (e.key === 'Escape') document.querySelector('[data-action="ac"]')?.click();
      else if (e.key === '%') document.querySelector('[data-action="pct"]')?.click();
    });
  </script>
</body>
</html>
